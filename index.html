<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>點餐小助手</title>
  
  <!-- 載入 Tailwind CSS 用於美化 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ============================================================================
    // ⚠️ 您的 Google Apps Script URL (如果因為更新部署導致網址變更，請務必更新這裡)
    // ============================================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9HLXBILdN2VO0T28pu5xj33dt0dlMHL-8BD9hEICpdA9St-mEHEMU-2S9puyZ1iZzZg/exec";

    // ============================================================================
    // 🏷️ 應用程式版本號設定
    // ============================================================================
    const APP_VERSION = "YS1.25";

    function App() {
      const today = new Date().toISOString().split('T')[0];

      const [formData, setFormData] = useState({
        nickname: '',
        date: today,
        noFood: false,
        foodName: '',
        foodPrice: '',
        foodPortion: '正常',
        foodSpiciness: '不調整',
        noMushroom: false,
        foodNote: '',
        noDrink: false,
        drinkName: '',
        drinkPrice: '',
        drinkSweetness: '無糖',
        drinkIce: '去冰',
        drinkNote: ''
      });

      const [status, setStatus] = useState('idle');

      const handleInputChange = (e) => {
        const { name, value, type, checked } = e.target;
        const inputValue = type === 'checkbox' ? checked : value;
        setFormData(prev => ({ ...prev, [name]: inputValue }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.nickname.trim()) {
          alert("請填寫暱稱！");
          return;
        }

        setStatus('submitting');

        const now = new Date();
        const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        // ======= 吃的資料整理 =======
        const finalFoodName = formData.noFood ? '不吃' : (formData.foodName || '');
        const finalFoodPrice = formData.noFood ? 0 : (Number(formData.foodPrice) || 0);
        const finalFoodPortion = formData.noFood ? '' : formData.foodPortion;
        const finalFoodSpiciness = formData.noFood ? '' : formData.foodSpiciness;
        const finalNoMushroom = formData.noFood ? '' : (formData.noMushroom ? '不菇' : '');
        const finalFoodNote = formData.noFood ? '' : (formData.foodNote || '');

        // ======= 喝的資料整理 =======
        const finalDrinkName = formData.noDrink ? '不喝' : (formData.drinkName || '');
        const finalDrinkPrice = formData.noDrink ? 0 : (Number(formData.drinkPrice) || 0);
        const finalDrinkSweetnessIce = formData.noDrink ? '' : `${formData.drinkSweetness}-${formData.drinkIce}`;
        const finalDrinkNote = formData.noDrink ? '' : (formData.drinkNote || '');
        
        // 總金額
        const totalAmount = finalFoodPrice + finalDrinkPrice;

        // 整理要送出的資料 (將品名與金額獨立拆開)
        const payload = {
          timestamp,
          nickname: formData.nickname,
          date: formData.date,

          foodName: finalFoodName,
          foodPrice: finalFoodPrice,
          foodPortion: finalFoodPortion,
          foodSpiciness: finalFoodSpiciness,
          noMushroom: finalNoMushroom,  
          foodNote: finalFoodNote,

          drinkName: finalDrinkName,
          drinkPrice: finalDrinkPrice,
          drinkSweetnessIce: finalDrinkSweetnessIce,
          drinkNote: finalDrinkNote,

          totalAmount
        };

        if (GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE") {
          setTimeout(() => {
            setStatus('success');
          }, 1000);
          return;
        }

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8', 
            },
            body: JSON.stringify(payload)
          });
          
          setStatus('success');
        } catch (error) {
          console.error("送出失敗:", error);
          setStatus('error');
        }
      };

      const resetForm = () => {
        setFormData({
          nickname: '',
          date: today,
          noFood: false,
          foodName: '',
          foodPrice: '',
          foodPortion: '正常',
          foodSpiciness: '不調整',
          noMushroom: false,
          foodNote: '',
          noDrink: false,
          drinkName: '',
          drinkPrice: '',
          drinkSweetness: '無糖',
          drinkIce: '去冰',
          drinkNote: ''
        });
        setStatus('idle');
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-orange-100 py-8 px-4 font-sans text-gray-800">
          <div className="max-w-lg mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100 relative">
            
            <div className="bg-orange-500 p-6 text-center relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <svg width="100" height="100" fill="white" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="20" cy="20" r="4" />
                  <circle cx="80" cy="80" r="4" />
                  <circle cx="80" cy="20" r="4" />
                  <circle cx="20" cy="80" r="4" />
                </svg>
              </div>
              
              {/* 🌟 右上角試算表捷徑 */}
              <a 
                href="https://docs.google.com/spreadsheets/d/1wumef4klvsfJg3x1pr9ul9H9hFGaP9vQrDydlKEuG84/edit?gid=0#gid=0" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="absolute top-4 right-4 text-orange-100 hover:text-white hover:scale-110 transition-all drop-shadow-md z-20 flex flex-col items-center gap-1"
                title="查看試算表後台"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="9" y2="21"/></svg>
                <span className="text-[10px] font-bold">後台</span>
              </a>

              <h1 className="text-3xl font-bold text-white mb-2 relative z-10 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-7 h-7"><path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/></svg>
                點餐小助手
              </h1>
              <p className="text-orange-100 text-sm relative z-10">
                輕鬆點餐，美味不漏接
              </p>
              <p className="text-green-700 text-sm text-right relative z-10 font-bold mt-1">
                by夜綠素 version:{APP_VERSION}
              </p>
            </div>

            {status === 'success' ? (
              <div className="p-10 text-center flex flex-col items-center justify-center min-h-[400px]">
                <div className="text-green-500 mb-4 animate-bounce flex justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-16 h-16"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <h2 className="text-2xl font-bold text-gray-800 mb-2">送出成功！</h2>
                <p className="text-gray-600 mb-8">您的點餐資訊已記錄。</p>
                <button 
                  onClick={resetForm}
                  className="px-6 py-3 bg-orange-100 text-orange-600 font-semibold rounded-full hover:bg-orange-200 transition-colors"
                >
                  再點一份
                </button>
              </div>
            ) : (
              <form onSubmit={handleSubmit} className="p-6 md:p-8 space-y-8">
                
                {GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE" && (
                  <div className="bg-blue-50 border border-blue-200 text-blue-700 p-3 rounded-xl flex gap-3 items-start text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    <p>
                      目前為<strong className="mx-1">展示模式</strong>。若要寫入試算表，請參考教學設定 Google Apps Script，並替換程式碼中的 <code>GOOGLE_SCRIPT_URL</code>。
                    </p>
                  </div>
                )}

                {status === 'error' && (
                  <div className="bg-red-50 text-red-600 p-3 rounded-xl flex gap-3 items-center text-sm border border-red-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                    <p>送出失敗，請檢查網路連線或系統設定。</p>
                  </div>
                )}

                <section className="space-y-4">
                  <h2 className="text-lg font-bold text-gray-800 border-b-2 border-orange-200 pb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-orange-500"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    基本資訊
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="block text-sm font-medium text-gray-700">暱稱 <span className="text-red-500">*</span></label>
                      <input
                        type="text"
                        name="nickname"
                        required
                        placeholder="請輸入您的暱稱"
                        value={formData.nickname}
                        onChange={handleInputChange}
                        className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none"
                      />
                    </div>
                    
                    <div className="space-y-1">
                      <label className="block text-sm font-medium text-gray-700">開動日期</label>
                      <div className="relative">
                        <input
                          type="date"
                          name="date"
                          value={formData.date}
                          onChange={handleInputChange}
                          className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none bg-white"
                        />
                      </div>
                    </div>
                  </div>
                </section>

                <section className="bg-orange-50/50 p-4 rounded-2xl border border-orange-100 transition-all duration-300">
                  <div className="flex items-center justify-between border-b-2 border-orange-200 pb-2 mb-4">
                    <h2 className="text-lg font-bold text-orange-800 flex items-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-orange-600"><path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/></svg>
                      吃的
                    </h2>
                    
                    <div className="flex items-center gap-2 px-2 py-1 bg-white rounded-lg shadow-sm border border-orange-200">
                      <input
                        type="checkbox"
                        id="noFood"
                        name="noFood"
                        checked={formData.noFood}
                        onChange={handleInputChange}
                        className="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500 cursor-pointer accent-orange-500"
                      />
                      <label htmlFor="noFood" className="text-sm font-bold text-gray-700 cursor-pointer select-none">
                        不吃
                      </label>
                    </div>
                  </div>
                  
                  {/* 如果勾選不吃，則隱藏下方欄位 */}
                  {!formData.noFood && (
                    <div className="space-y-4 animate-in fade-in slide-in-from-top-2 duration-300">
                      <div className="grid grid-cols-3 gap-4">
                        <div className="space-y-1 col-span-2">
                          <label className="block text-sm font-medium text-gray-700">品名</label>
                          <input
                            type="text"
                            name="foodName"
                            placeholder="例如：排骨便當"
                            value={formData.foodName}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none"
                          />
                        </div>
                        <div className="space-y-1 col-span-1">
                          <label className="block text-sm font-medium text-gray-700">金額</label>
                          <input
                            type="number"
                            name="foodPrice"
                            min="0"
                            placeholder="0"
                            value={formData.foodPrice}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none bg-white"
                          />
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-gray-700">主食份量</label>
                          <select
                            name="foodPortion"
                            value={formData.foodPortion}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none bg-white"
                          >
                            <option value="正常">正常</option>
                            <option value="飯少">飯少</option>
                            <option value="半飯">半飯</option>
                            <option value="加飯">加飯</option>
                            <option value="麵少">麵少</option>
                            <option value="加麵">加麵</option>
                          </select>
                        </div>
                        
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-gray-700">辣度</label>
                          <select
                            name="foodSpiciness"
                            value={formData.foodSpiciness}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none bg-white"
                          >
                            <option value="不調整">不調整</option>
                            <option value="不辣">不辣</option>
                            <option value="微辣">微辣</option>
                            <option value="小辣">小辣</option>
                            <option value="中辣">中辣</option>
                            <option value="大辣">大辣</option>
                          </select>
                        </div>
                      </div>

                      <div className="flex items-center gap-2 px-1">
                        <input
                          type="checkbox"
                          id="noMushroom"
                          name="noMushroom"
                          checked={formData.noMushroom}
                          onChange={handleInputChange}
                          className="w-5 h-5 text-orange-500 border-gray-300 rounded focus:ring-orange-500 cursor-pointer accent-orange-500"
                        />
                        <label htmlFor="noMushroom" className="text-sm font-medium text-gray-700 cursor-pointer select-none">
                          不菇 (不要香菇、金針菇等任何菇類) 🍄❌
                        </label>
                      </div>
                      
                      <div className="space-y-1">
                        <label className="block text-sm font-medium text-gray-700">備註 (選填)</label>
                        <input
                          type="text"
                          name="foodNote"
                          placeholder="例如：不要香菜、多一點醬"
                          value={formData.foodNote}
                          onChange={handleInputChange}
                          className="w-full px-4 py-2.5 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none"
                        />
                      </div>
                    </div>
                  )}
                </section>

                <section className="bg-amber-50/50 p-4 rounded-2xl border border-amber-100 transition-all duration-300">
                  <div className="flex items-center justify-between border-b-2 border-amber-200 pb-2 mb-4">
                    <h2 className="text-lg font-bold text-amber-800 flex items-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-amber-600"><path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/></svg>
                      喝的
                    </h2>
                    
                    <div className="flex items-center gap-2 px-2 py-1 bg-white rounded-lg shadow-sm border border-amber-200">
                      <input
                        type="checkbox"
                        id="noDrink"
                        name="noDrink"
                        checked={formData.noDrink}
                        onChange={handleInputChange}
                        className="w-4 h-4 text-amber-500 border-gray-300 rounded focus:ring-amber-500 cursor-pointer accent-amber-500"
                      />
                      <label htmlFor="noDrink" className="text-sm font-bold text-gray-700 cursor-pointer select-none">
                        不喝
                      </label>
                    </div>
                  </div>
                  
                  {/* 如果勾選不喝，則隱藏下方欄位 */}
                  {!formData.noDrink && (
                    <div className="space-y-4 animate-in fade-in slide-in-from-top-2 duration-300">
                      <div className="grid grid-cols-3 gap-4">
                        <div className="space-y-1 col-span-2">
                          <label className="block text-sm font-medium text-gray-700">品名</label>
                          <input
                            type="text"
                            name="drinkName"
                            placeholder="例如：珍珠奶茶"
                            value={formData.drinkName}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all outline-none"
                          />
                        </div>
                        <div className="space-y-1 col-span-1">
                          <label className="block text-sm font-medium text-gray-700">金額</label>
                          <input
                            type="number"
                            name="drinkPrice"
                            min="0"
                            placeholder="0"
                            value={formData.drinkPrice}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all outline-none bg-white"
                          />
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-gray-700">甜度</label>
                          <select
                            name="drinkSweetness"
                            value={formData.drinkSweetness}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all outline-none bg-white"
                          >
                            <option value="正常糖">正常糖</option>
                            <option value="少糖">少糖 (8分)</option>
                            <option value="半糖">半糖 (5分)</option>
                            <option value="微糖">微糖 (3分)</option>
                            <option value="一分糖">一分糖</option>
                            <option value="無糖">無糖</option>
                          </select>
                        </div>
                        
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-gray-700">冰塊</label>
                          <select
                            name="drinkIce"
                            value={formData.drinkIce}
                            onChange={handleInputChange}
                            className="w-full px-4 py-2.5 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all outline-none bg-white"
                          >
                            <option value="正常冰">正常冰</option>
                            <option value="少冰">少冰</option>
                            <option value="微冰">微冰</option>
                            <option value="去冰">去冰</option>
                            <option value="完全去冰">完全去冰</option>
                            <option value="常溫">常溫</option>
                            <option value="熱">熱</option>
                          </select>
                        </div>
                      </div>

                      <div className="space-y-1">
                        <label className="block text-sm font-medium text-gray-700">備註 (選填)</label>
                        <input
                          type="text"
                          name="drinkNote"
                          placeholder="例如：換燕麥奶、加波霸"
                          value={formData.drinkNote}
                          onChange={handleInputChange}
                          className="w-full px-4 py-2.5 rounded-xl border border-amber-200 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all outline-none"
                        />
                      </div>
                    </div>
                  )}
                </section>

                <button
                  type="submit"
                  disabled={status === 'submitting'}
                  className={`w-full py-3.5 rounded-xl font-bold text-white shadow-lg flex items-center justify-center gap-2 transition-all 
                    ${status === 'submitting' 
                      ? 'bg-orange-400 cursor-not-allowed' 
                      : 'bg-orange-500 hover:bg-orange-600 hover:shadow-orange-500/30 hover:-translate-y-0.5'}`}
                >
                  {status === 'submitting' ? (
                    <span className="flex items-center gap-2">
                      <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
